syntax = "proto3";

package com.card.game.proto.gateway;

import "common/common.proto";

option java_multiple_files = true;
option java_package = "com.card.game.proto.gateway";

/**
 * 推送给指定玩家
 */
message PushToPlayerRequest {
  string playerId = 1;
  common.GameMessage message = 2;
}

/**
 * 推给所有玩家
 */
message PushToAllRequest{
  common.GameMessage message = 1;
}

/**
 * 玩家群类型
 */
enum PlayerGroupType{
  TEMP_GROUP = 0;   //临时组用于业务处理，groupId无意义
  CHAT_GROUP = 1;
  GAME_GROUP = 2;
}

/**
 * 玩家群
 */
message PlayerGroup{
  PlayerGroupType type = 1;
  string groupId = 2;
  repeated string playerId = 3;
}

/**
 * 推给玩家群
 */
message PushToPlayerGroupRequest{
  PlayerGroup group = 1;
  common.GameMessage message = 2;
}