syntax = "proto3";

package com.card.game.proto.author;

import "game/game.proto";

option java_multiple_files = true;
option java_package = "com.card.game.proto.match";

enum MatchStatus {
  MATCHING = 0;     // 匹配中
  SUCCESS = 1;      // 匹配成功
  FAIL = 2;         // 匹配失败
  CANCEL = 3;       // 匹配取消
  TIMEOUT = 4;      // 匹配超时
}

/**
 * 匹配通用请求
 */
message MatchCommonRequest {
  GameType gameType = 1;        // 游戏类型
  string playerId = 2;          // 玩家id
  oneof matchRequest {
    MatchDoudizhuRequest doudizhu = 3;
    MatchJunzhengRequest junzheng = 4;
  }
}
/**
 * 匹配通用响应
 */
message MatchCommonResponse {
  MatchStatus status = 1;
  string roomId = 2;
  oneof matchResult {
    MatchDoudizhuResponse doudizhu = 3;
    MatchJunzhengResponse junzheng = 4;
  }
}

/**
 * 斗地主匹配请求
 */
message MatchDoudizhuRequest {

}
/**
 * 斗地主匹配响应
 */
message MatchDoudizhuResponse {

}

/**
 * 军争匹配请求
*/
message MatchJunzhengRequest {

}
/**
 * 军争匹配响应
 */
message MatchJunzhengResponse {

}


