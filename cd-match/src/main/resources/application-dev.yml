# Spring 配置
spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/card_game?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: GameLoginHikariPool

  # JPA 配置
  jpa:
    show-sql: true  # 开发环境开启，生产环境关闭
    hibernate:
      ddl-auto: update  # 生产环境用 validate，开发可用 update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
    open-in-view: false

    redis:
      host: localhost
      port: 6379
      password:                    # 无密码时留空
      database: 0                  # 数据库索引
      timeout: 5000ms              # 连接超时

      # Lettuce 连接池配置
      lettuce:
        pool:
          max-active: 20           # 最大连接数
          max-idle: 10             # 最大空闲连接
          min-idle: 5              # 最小空闲连接
          max-wait: 2000ms         # 获取连接最大等待时间
        shutdown-timeout: 100ms    # 关闭超时

etcd:
  endpoints: http://localhost:2379

# gRPC 配置
grpc:
  server:
    port: 8006
    max-inbound-message-size: 10485760  # 10MB
    keep-alive-time: 30
    keep-alive-timeout: 10
