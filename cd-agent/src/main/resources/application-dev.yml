# Spring 配置
spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/card_game?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: GameLoginHikariPool

  # JPA 配置
  jpa:
    show-sql: true  # 开发环境开启，生产环境关闭
    hibernate:
      ddl-auto: update  # 生产环境用 validate，开发可用 update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
    open-in-view: false

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 2000ms

etcd:
  endpoints: http://localhost:2379

# gRPC 配置
grpc:
  server:
    port: 8004
    max-inbound-message-size: 10485760  # 10MB
    keep-alive-time: 30
    keep-alive-timeout: 10