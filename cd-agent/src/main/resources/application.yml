# 应用配置
app:
  name: agent-server
  version: 1.0.0
  env: dev
  instance-id: agent-server-1
  session:
    expire-seconds: 90
    heartbeat-timeout-seconds: 90
    max-online-players: 100000
  thread-pool:
    core-pool-size: 8
    max-pool-size: 32
    queue-capacity: 1000
    thread-name-prefix: agent-worker-

# 服务器配置
server:
  port: 8003
  tomcat:
    threads:
      min-spare: 4
      max: 200
    connection-timeout: 30000
  compression:
    enabled: true
    mime-types: application/json


# Spring 配置
spring:
  application:
    name: agent-server
  profiles:
    active: dev


# 日志配置
logging:
  config: classpath:logback.xml

