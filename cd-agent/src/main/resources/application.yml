# 应用配置
app:
  name: agent-server
  version: 1.0.0
  env: dev
  instance-id: agent-server-1
  session:
    expire-seconds: 90
    heartbeat-timeout-seconds: 90
    max-online-players: 100000
  thread-pool:
    core-pool-size: 8
    max-pool-size: 32
    queue-capacity: 1000
    thread-name-prefix: agent-worker-

# 服务器配置
server:
  port: 8093
  tomcat:
    threads:
      min-spare: 4
      max: 200
    connection-timeout: 30000
  compression:
    enabled: true
    mime-types: application/json

# Spring 配置
spring:
  application:
    name: agent-server

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/card_game?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: GameLoginHikariPool

  # JPA 配置
  jpa:
    show-sql: true  # 开发环境开启，生产环境关闭
    hibernate:
      ddl-auto: update  # 生产环境用 validate，开发可用 update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
    open-in-view: false

  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 2000ms

# gRPC 配置
grpc:
  server:
    port: 8092
    max-inbound-message-size: 10485760  # 10MB
    keep-alive-time: 30s
    keep-alive-timeout: 10s
  client:
    login-service:
      address: static://localhost:8090
      negotiation-type: plaintext

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

# 日志配置
logging:
  level:
    com.card.game.agent: DEBUG
    org.springframework: INFO
    io.grpc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent-server.log
    max-size: 100MB
    max-history: 30